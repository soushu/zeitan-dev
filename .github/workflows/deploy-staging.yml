name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-gce
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to staging
        run: |
          gcloud compute ssh yutookiguchi@bitpoint-bot \
            --zone=us-west1-b \
            --tunnel-through-iap \
            --command="bash /home/yutookiguchi/zeitan-dev-staging/deploy/deploy-staging.sh"

      - name: Health check
        run: |
          gcloud compute ssh yutookiguchi@bitpoint-bot \
            --zone=us-west1-b \
            --tunnel-through-iap \
            --command="curl -sf http://127.0.0.1:8004/health"
